version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pria_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-pria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pria_prod_secure_pw}
      POSTGRES_DB: ${DB_NAME:-pria_v7}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pria} -d ${DB_NAME:-pria_v7}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pria_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pria_redis_prod
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pria_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pria_backend_prod
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-pria}:${DB_PASSWORD:-pria_prod_secure_pw}@postgres:5432/${DB_NAME:-pria_v7}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_MODEL: gemini-2.0-flash
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pria_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pria_frontend_prod
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_APP_NAME: PRIA v7
      NEXT_PUBLIC_SCHOOL_NAME: Las Palmas
    depends_on:
      - backend
    networks:
      - pria_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pria_network:
    driver: bridge
