name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pria_local
          POSTGRES_DB: pria
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:pria_local@localhost:5432/pria
      JWT_SECRET: ci-test-jwt-secret-key-minimum-32-chars!!
      CORS_ORIGIN: http://localhost:5173
      SKIP_MIGRATION_SECURITY_CHECK: '1'  # server/src/db/migrate.ts:80 — migrations dir is writable on GH Actions runners

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Typecheck server
        run: npx tsc --noEmit
        working-directory: server

      - name: Run server tests
        run: npm test
        working-directory: server

      - name: Install frontend dependencies
        run: npm ci
        working-directory: .

      - name: Build frontend
        run: npm run build
        working-directory: .

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E (backend in same step as Playwright)
        run: |
          set +e
          # Start backend in background within THIS shell session.
          # The `&` is safe because the shell stays alive until the e2e tests
          # complete (and explicit `kill` at the end). This is fundamentally
          # different from `&` in a separate step.
          npm --prefix server run dev > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"

          # Wait up to 60s for backend health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend is healthy after $((i*2))s"
              break
            fi
            echo "Waiting for backend... attempt $i/30"
            sleep 2
          done

          # If backend never came up, dump logs and fail before running e2e
          if ! curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
            echo "::error::Backend did not become healthy in time"
            echo "=== /tmp/backend.log ==="
            cat /tmp/backend.log
            echo "=== end log ==="
            kill $BACKEND_PID 2>/dev/null || true
            exit 1
          fi

          # Run E2E — Playwright starts Vite via webServer config (port 5173)
          echo "Running Playwright E2E tests..."
          npm run test:e2e
          TEST_EXIT=$?
          echo "Playwright exited with code $TEST_EXIT"

          # Cleanup backend (whether tests passed or failed)
          kill $BACKEND_PID 2>/dev/null || true
          # Give backend 2s to shut down gracefully, then force if needed
          sleep 2
          kill -9 $BACKEND_PID 2>/dev/null || true

          exit $TEST_EXIT