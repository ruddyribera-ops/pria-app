name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=db_pria --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Validate Railway config
        run: |
          python -c "import tomllib; tomllib.load(open('railway.toml','rb'))"
          python -c "import tomllib; tomllib.load(open('nixpacks.toml','rb'))"
        shell: bash

      - name: Check requirements parse
        run: |
          python -c "import pkg_resources; [pkg_resources.Requirement.parse(l.strip()) for l in open('requirements.txt') if l.strip() and not l.startswith('#')]"
