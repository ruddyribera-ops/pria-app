name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=db --cov=ui --cov=pria_docs --cov=pria --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  validate-config:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Validate Railway config
        run: |
          python -c "import tomllib; tomllib.load(open('railway.toml','rb'))"
          python -c "import tomllib; tomllib.load(open('nixpacks.toml','rb'))"
        shell: bash

      - name: Check requirements parse
        run: |
          python -c "import pkg_resources; [pkg_resources.Requirement.parse(l.strip()) for l in open('requirements.txt') if l.strip() and not l.startswith('#')]"

  deploy:
    needs: [test, validate-config]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --detach --service PRIAv5

  health-check:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Health check
        run: |
          for i in {1..8}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://priav5-production.up.railway.app)
            if [ "$status" = "200" ]; then echo "Health OK"; exit 0; fi
            echo "Attempt $i: status=$status, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 8 attempts"
          exit 1
