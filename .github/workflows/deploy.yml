name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: pria-v7-backend:${{ github.sha }},pria-v7-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: pria-v7-frontend:${{ github.sha }},pria-v7-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v3
        with:
          name: backend-docker-image
          path: /tmp/backend-image.tar
          retention-days: 1

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-docker-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-docker-images

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pria
          POSTGRES_PASSWORD: pria_test
          POSTGRES_DB: pria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-cov

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://pria:pria_test@localhost:5432/pria_test
        run: |
          cd backend
          python -m pytest tests/ -v --cov=app || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd frontend
          pnpm build

  deploy-staging:
    name: Deploy to Staging (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service backend --service frontend --service postgres

      - name: Wait for deployment
        run: |
          for i in {1..10}; do
            if curl -f http://pria-v7-staging.railway.app/api/health/live; then
              echo "✅ Deployment successful"
              exit 0
            fi
            echo "Waiting for deployment... ($i/10)"
            sleep 10
          done
          echo "❌ Deployment timeout"
          exit 1

      - name: Run migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway exec alembic upgrade head

      - name: Health check
        run: |
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -f https://pria-v7-staging.railway.app/api/health/live; then
              echo "✅ Health check passed"
              exit 0
            fi
            attempt=$((attempt + 1))
            sleep 10
          done
          echo "⚠️ Health check failed after $max_attempts attempts"

      - name: Notify Slack (Success)
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ PRIA v7 deployed to staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Successful*\n*Commit:* ${{ github.sha }}\n*Branch:* main\n*Status:* Production Ready"
                  }
                }
              ]
            }

      - name: Notify Slack (Failure)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ PRIA v7 deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\n*Commit:* ${{ github.sha }}\n*Branch:* main\n*Action:* Check logs"
                  }
                }
              ]
            }
