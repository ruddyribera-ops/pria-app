name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: pria-v7-backend:${{ github.sha }},pria-v7-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: pria-v7-frontend:${{ github.sha }},pria-v7-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: /tmp/backend-image.tar
          retention-days: 1

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-docker-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build-docker-images

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pria
          POSTGRES_PASSWORD: pria_test
          POSTGRES_DB: pria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-cov

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://pria:pria_test@localhost:5432/pria_test
        run: |
          cd backend
          python -m pytest tests/ -v --cov=app || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          cd frontend
          pnpm build

  deploy-staging:
    name: Deploy to Staging (Railway)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service backend
          railway up --service frontend

      - name: Run migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway exec --service backend -- alembic upgrade head

      - name: Health check
        continue-on-error: true
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30
          max_attempts=5
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            HEALTH_URL=$(railway status --service backend --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))" 2>/dev/null || echo "")
            if [ -n "$HEALTH_URL" ] && curl -sf "$HEALTH_URL/api/health/live"; then
              echo "✅ Health check passed: $HEALTH_URL"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts failed, retrying in 15s..."
            attempt=$((attempt + 1))
            sleep 15
          done
          echo "⚠️ Health check inconclusive — verify manually in Railway dashboard"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify Slack (Success)
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ PRIA v7 deployed to staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Successful*\n*Commit:* ${{ github.sha }}\n*Branch:* main\n*Status:* Production Ready"
                  }
                }
              ]
            }

      - name: Notify Slack (Failure)
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ PRIA v7 deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed*\n*Commit:* ${{ github.sha }}\n*Branch:* main\n*Action:* Check logs"
                  }
                }
              ]
            }
